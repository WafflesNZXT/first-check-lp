app = "audo-live-agent"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  LIVE_AGENT_WORKER_HOST = "0.0.0.0"
  LIVE_AGENT_WORKER_PORT = "8080"
  LIVE_AGENT_POLL_JOBS = "true"
  LIVE_AGENT_HEADLESS = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
