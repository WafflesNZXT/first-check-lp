<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="gradA" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#bff1ff" />
      <stop offset="60%" stop-color="#7de2ff" />
      <stop offset="100%" stop-color="#60a5fa" />
    </radialGradient>
    <linearGradient id="gradB" x1="0" x2="1">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#7c5cff" />
    </linearGradient>
  </defs>

  <g transform="translate(64,64)">
    <!-- draw multiple petals rotated around center -->
    <g opacity="0.98">
      <g fill="url(#gradA)" transform="scale(1)">
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(0)" />
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(60)" />
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(120)" />
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(180)" />
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(240)" />
        <ellipse rx="18" ry="34" cx="0" cy="-30" transform="rotate(300)" />
      </g>
      <g fill="url(#gradB)" opacity="0.9" transform="scale(0.75)">
        <ellipse rx="10" ry="20" cx="8" cy="-18" transform="rotate(30)" />
        <ellipse rx="10" ry="20" cx="8" cy="-18" transform="rotate(90)" />
        <ellipse rx="10" ry="20" cx="8" cy="-18" transform="rotate(150)" />
      </g>
    </g>
  </g>
</svg>
